<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Selecionar Fábrica</title>
    <link rel="stylesheet" href="css/fabricas.css">
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body>

    <header class="header">
        <a href="trackSense.html">
            <img src="assets/logo-minimalista-tracksense.png" alt="Logo TrackSense">
        </a>
        <nav class="nav-bar">
            <ul>
                <li><a href="trackSense.html">Home</a></li>
                <li><a class="active" href="#">Dashboard</a></li>
                <li><a href="calculadora.html">Calculadora Financeira</a></li>
                <li><a href="suporte.html">Suporte</a></li>
                <li id="linkLogout" style="display: block;">
                    <a href="#" onclick="logout()">Sair</a>
                </li>
            </ul>
        </nav>
    </header>


    <section class="container">

        <div class="conteudoContainer">
            <h1>Selecione uma fábrica</h1>

            <div id="fabricas" class="fabricas">
                
            </div>

        </div>

    </section>

</body>

</html>

<script>
    function selecionarFabrica(idEmpresa) {
        sessionStorage.EMPRESA = idEmpresa;
        window.location.href = "dashboard-geral.html";
    }

    let producaoEsperada = 100;

    function verMatriz() {
        let idEmpresa = sessionStorage.EMPRESA; 

        fetch(`matriz/verMatriz/${idEmpresa}`)
            .then(function (resposta) {
                return resposta.json();
            })
            .then(function (dados) {
                console.log(dados);

                if (dados.length > 1) {
                    fabricas.innerHTML = ""; 

                    for (let i = 0; i < dados.length; i++) {
                        let eficienciaReal = ((dados[i].eficiencia / producaoEsperada) * 100).toFixed();

                        let card = `
                        <div class="card" onclick="selecionarFabrica('${dados[i].idEmpresa}')">
                            <h2>${dados[i].nome}</h2>
                            <p>${dados[i].maquinas} máquinas</p>
                        `;

                        if (eficienciaReal < 60) {
                            card += `
                            <span class="alerta">Maquinas em alerta</span>
                        </div>
                            `;
                        } else {
                            card += `
                            <span class="normal">Operação normal</span>
                        </div>
                            `; 
                        }

                        fabricas.innerHTML += card;
                    }
                } else if (dados.length === 1) {
                    selecionarFabrica(dados[0].idEmpresa);
                } else {
                    alert("O usuário não possui empresas cadastradas no sistema.");
                }
            })
            .catch(function (erro) {
                alert("Erro ao carregar os dados das fábricas.");
                console.log("Erro ao buscar empresa:", erro);
            });
    }

    verMatriz();

    if (sessionStorage.getItem("logado") === "true") {
        document.getElementById("linkDashboard").style.display = "block";
        document.getElementById("linkLogout").style.display = "block";
        document.getElementById("linkLogin").style.display = "none";
    }

    function logout() {
        sessionStorage.clear(); 
        window.location.href = "login.html";
    }
</script>
