<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSense | Cadastro</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="css/loginCadastro.css">
</head>

<body>
    <header class="header">
        <a href="trackSense.html">
          <img src="assets/img/logo-minimalista-tracksense.png" alt="Logo TrackSense">
        </a>
        <nav class="nav-bar">
            <ul>
                <li><a href="trackSense.html">Home</a></li>
                <li><a href="dashboard.html">Dashboards</a></li>
                <li><a href="calculadora.html">Calculadora Financeira</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">


        <div class="bloq side1 cad">
            <p class="title">Crie sua conta</p>
            <p class="text">Informe seus dados pessoas e comece sua jornada conosco</p>
        </div>

        <div class="bloq side2">
            <div class="logo1"></div>

            <div class="input">
                <input type="text" id="inpNome" placeholder="Nome*">

                <input type="text" id="inpEmail" oninput="cadValidarEmail()" placeholder="Email*">
                <div id="exibirResultadoEmail"></div>

                <input type="password" id="inpSenha" oninput="cadValidarCadastro()" placeholder="Senha*">
                <div id="exibirResultadoCadastro"></div>

                <input type="password" id="inpSenhaConf" oninput="cadValidarCadastro()" placeholder="Confirme sua Senha*">
            </div>

            <button onclick="CadCadastrar()" class="button">Cadastrar</button>

            <p class="text">Já tem uma conta? <b><a href="login.html">Faça login!</a></b></p>

        </div>


    </div>

    <footer class="footer">
        <p>© 2026 TrackSense. Todos os direitos reservados.</p>
    </footer>

</body>

</html>
