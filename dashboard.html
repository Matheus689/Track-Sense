<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/dashboard.css">
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header class="header">
        <img src="assets/img/logo-minimalista-tracksense.png" alt="Logo TrackSense">
        <nav class="nav-bar">
            <ul>
                <li><a href="trackSense.html">Sobre</a></li>
                <li><a class="active" href="#">Dashboards</a></li>
                <li><a href="calculadora.html">Calculadora Financeira</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <section class="boxes">
            <div class="box">
                <h3>Produção Atual</h3>
                <p id="producao">0 latas/min</p>
            </div>
            <div class="box">
                <h3>Total Produzido</h3>
                <p id="total">0 latas</p>
            </div>
            <div class="box">
                <h3>Eficiência</h3>
                <p id="eficiencia">0%</p>
            </div>
            <div class="box">
                <h3>Produção no Intervalo</h3>
                <p id="intervalo">0 latas</p>
            </div>
        </section>
        <section class="graphic">
            <h2>Produção Real vs Esperado (latas/min)</h2>
            <canvas id="graphicLine"></canvas>
        </section>

        <section class="alert">
            <p id="alert">Sistema operando normalmente</p>
        </section>

    </main>

    <footer class="footer">
        <p>© 2026 TrackSense. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
<script>
    const labels = [];

    const data = {
        labels: labels,
        datasets: [
            {
                label: "Produção Real (latas/min)",
                data: [],
                borderColor: "green",
                backgroundColor: "green",
            },
            {
                label: "Produção Esperada (latas/min)",
                data: [80, 80, 80, 80, 80],
                borderColor: "red",
                borderDash: [5, 5],
            }
        ]
    };

    const config = {
        type: "line",
        data: data,
        options: {
            plugins: {
                legend: {
                    labels: { color: "white" }
                }
            },
            scales: {
                x: { ticks: { color: "white" } },
                y: {
                    ticks: { color: "white" },
                    beginAtZero: true
                }
            }
        }
    };

    const grafico = new Chart(
        document.getElementById("graphicLine"),
        config
    );

    let total = 0;
    let producaoPorMinuto = 80; // base inicial
    function atualizarDashboard() {
        // variação pequena (simula máquina real)
        let variacao = Math.floor(Math.random() * 7) - 3; // -3 a +3
        producaoPorMinuto += variacao;

        // limites realistas
        if (producaoPorMinuto < 60) producaoPorMinuto = 60;
        if (producaoPorMinuto > 100) producaoPorMinuto = 100;

        let producaoPorSegundo = producaoPorMinuto / 60;
        // calcular produção no intervalo de 3 segundos
        let producaoNoIntervalo = Math.floor(producaoPorSegundo * 3);

        total += producaoNoIntervalo;

        // eficiência
        let eficiencia = Math.floor((producaoPorMinuto / 80) * 100);

        
        document.getElementById("producao").innerText =
            Math.floor(producaoPorMinuto) + " latas/min";

        document.getElementById("total").innerText =
            Math.floor(total) + " latas";

        document.getElementById("eficiencia").innerText =
            eficiencia + "%";
        document.getElementById("intervalo").innerText =
            (producaoNoIntervalo) + " latas";

        if (eficiencia < 80) {
            document.getElementById("alert").innerText =
                "Produção abaixo do esperado!";
        } else {
            document.getElementById("alert").innerText =
                "Produção normal";
        }

        data.labels.push(new Date().toLocaleTimeString());
        data.datasets[0].data.push(producaoPorMinuto);
        data.datasets[1].data.push(80);

        if (data.labels.length > 10) {
            data.labels.shift();
            data.datasets[0].data.shift();
            data.datasets[1].data.shift();
        }
        grafico.update();
    }

    setInterval(atualizarDashboard, 3000);
</script>
