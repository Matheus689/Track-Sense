<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora financeira</title>
</head>
<body>
        <h1>Calculadora financeira</h1>

        Digite a produção (lata/min) <input type="text" id="inputProducao">
        <br>
        <br>
        Digite o preço da lata de milho (Lucro/lata) <input type="text" id="inputPrecoLata">
        <br>
        <br>
        Digite o tempo de parada da Case Packer (Horas) <input type="text" id="inputTempoParada">
        <br>
        <br>
        <button onclick="analisarEconomia()">Analisar economia</button>
        <div id="divMensagem"></div>
</body>
</html>
<script>
            function analisarEconomia (){
                //-	erro = 2% por h
                // Horas por dia = 8
                //-	Dias por mês = 22
                //-	Custo do sistema = 5000 valor ainda a definir
                //-	dinheiro perdido por erro: produção/mes * erro * preco 
                //-	dinheiro perdido por parada no mes = latas/min * parada * preço* 22 dias

                let producao = inputProducao.value
                let precoLata = inputPrecoLata.value
                let tempoParada = inputTempoParada.value        
                let producaoMensal = producao * 60 * 8 * 22
                let valorProducao = producaoMensal * precoLata
                let perdaErro = producao * 60 * precoLata / 100 * 2 * 8 * 22
                let perdaParada = producao * tempoParada * precoLata * 60 * 8 * 22 // média mensal - discutir com o B e C
                let perdaTotal = perdaErro + perdaParada
                let economiaSistema = perdaTotal - 5000

                divMensagem.innerHTML = `-	Produção mensal: ${producaoMensal} <br>
-	Perda por erro: R$ ${perdaErro} <br>
-	Perda por parada: R$ ${perdaParada} <br>
-	Perda total: R$ ${perdaTotal} <br>
-	Economia com sistema: R$ ${economiaSistema}
`
            }
</script>
