<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TrackSense{% endblock %}</title>
  <link rel="stylesheet" href="styles.css" />
  {% block styles %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="brand">
        <img src="logo.png" alt="TrackSense logo" />
        <span>TrackSense</span>
      </a>
      <nav>
        <ul class="nav-menu">
          <li><a href="#sobre">Sobre</a></li>
          <li><a href="#dashboards">Dashboards</a></li>
          <li><a href="#calculadora">Calculadora Financeira</a></li>
          <li><a href="#ocorrencias">Ocorrências</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    {% block footer %}
    <p>© 2026 TrackSense. Todos os direitos reservados.</p>
    {% endblock %}
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
